server:
  port: 8081

spring:
  data:
    redis:
      host: localhost
      port: 6379

ratelimiter:
  strategy: token-bucket       # token-bucket | sliding-window
  backend: in-memory           # in-memory | redis
  capacity: 5                  # token-bucket: max burst size
  refill-rate: 1.0             # token-bucket: tokens added per second
  window-seconds: 10           # sliding-window: window size
  max-requests: 5              # sliding-window: max requests per window
